name: Deploy Frontend (S3 + CloudFront)

# Pushing to main (touching frontend/**) builds the site and ships it to
# S3 + CloudFront. Can also be run manually from the Actions tab.
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch: {} # also lets you trigger it manually from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        # Same-origin setup: the frontend calls /api and connects the socket at /
        # on the same CloudFront domain (CloudFront routes those to the backend),
        # so these are relative paths baked into the bundle at build time.
        env:
          VITE_API_URL: /api
          VITE_SOCKET_URL: /
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload build to S3
        # --delete removes files that no longer exist in the new build.
        run: aws s3 sync dist/ "s3://${{ secrets.S3_BUCKET }}" --delete

      - name: Invalidate CloudFront cache
        # Without this, CloudFront keeps serving the OLD index.html for hours.
        run: >-
          aws cloudfront create-invalidation
          --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          --paths "/*"
