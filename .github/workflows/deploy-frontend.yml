name: Deploy Frontend (S3 + CloudFront)

# After the one-time AWS setup (see DEPLOYMENT.md), pushing to main builds and
# ships the site.
#
# Manual-only for now (workflow_dispatch) until the S3 bucket + GitHub secrets are
# configured. Once AWS is set up, re-enable auto-deploy by uncommenting the push
# trigger below.
on:
  # push:
  #   branches: [main]
  #   paths:
  #     - "frontend/**"
  #     - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch: {} # also lets you trigger it manually from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        # These are baked into the bundle at build time (that's why they're here
        # and not on the server). They point the frontend at your EC2 backend.
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SOCKET_URL: ${{ secrets.VITE_SOCKET_URL }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload build to S3
        # --delete removes files that no longer exist in the new build.
        run: aws s3 sync dist/ "s3://${{ secrets.S3_BUCKET }}" --delete

      - name: Invalidate CloudFront cache
        # Without this, CloudFront keeps serving the OLD index.html for hours.
        run: >-
          aws cloudfront create-invalidation
          --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          --paths "/*"
